   Вычисляет числовой рейтинг одного актива.
   Формула:
     + change * 2   — вес дневного изменения цены (%)
     + week         — недельное изменение (%)
     + 0.5          — бонус за тип "fx" (валюта)
     + 1            — бонус за тип "stock" (акция)
   Возвращает float с двумя знаками после запятой.
   ============================================================ */
function score(a){
  let s = 0;
  s += a.change * 2;
  s += a.week;

  if(a.type === "fx") s += 0.5;
  if(a.type === "stock") s += 1;

  return parseFloat(s.toFixed(2));
}

/* ============================================================
   БЛОК: ЗАГРУЗКА ОДНОЙ АКЦИИ MOEX — loadMoexQuote(ticker)
   Источник: MOEX ISS API (iss.moex.com)
   Приоритет полей цены: LAST → MARKETPRICE → LCURRENTPRICE → fallback(280)
   Возвращает число (цену последней сделки).
   ============================================================ */
async function loadMoexQuote(ticker) {

  /* --- Fallback-цена при ошибке API --- */
  const fallbackPrice = 280;

  try {

    /* --- Формирование URL запроса к MOEX ISS --- */
    const url =
      `https://iss.moex.com/iss/engines/stock/markets/shares/securities/${ticker}.json`;

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("MOEX API unavailable");
    }

    const data = await response.json();

    /* --- MOEX возвращает колонки и строки раздельно, сопоставляем их --- */
    const columns = data.marketdata.columns;
    const row = data.marketdata.data[0];

    if (!row) {
      throw new Error("No market data");
    }

    /* --- Вспомогательная функция: получить значение поля по имени колонки --- */
    const getField = (name) => {
      const idx = columns.indexOf(name);
      return idx >= 0 ? row[idx] : null;
    };

    /* --- Выбираем первое непустое ценовое поле из приоритетного списка --- */
    const last =
  getField("LAST") ||
  getField("MARKETPRICE") ||
  getField("LCURRENTPRICE") ||
  fallbackPrice;

const prev =
  getField("LASTTOPREVPRICE") ||
  last;

const change =
  prev
    ? ((last - prev) / prev) * 100
    : 0;

console.log(`MOEX ${ticker}:`, {
  last,
  prev,
  change
});

return {
  price: Number(last),
  change: Number(change.toFixed(2))
};

  } catch (err) {

    /* --- Логируем ошибку, возвращаем fallback --- */
    console.warn(
      `Не удалось получить цену ${ticker} из MOEX`,
      err
    );

    return fallbackPrice;

  }

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ОДНОЙ АКЦИИ MOEX
   ============================================================ */

/* ============================================================
   БЛОК: РАСЧЁТ РЕЙТИНГА — calculateScores(data)
   Принимает массив активов, добавляет поле score каждому,
   возвращает отсортированный по убыванию score массив.
   ============================================================ */
function calculateScores(data) {

  return data
    .map(asset => ({
      ...asset,
      score: score(asset)
    }))
    .sort((a, b) => b.score - a.score);

}
/* ============================================================
   КОНЕЦ БЛОКА: РАСЧЁТ РЕЙТИНГА

/* ============================================================

   Разбивает единый отсортированный массив на три категории.
   Возвращает объект { fx, stocks, bonds }.
   ============================================================ */
function generateRecommendations(rankedAssets) {

  return {
    fx:     rankedAssets.filter(x => x.type === "fx"),
    stocks: rankedAssets.filter(x => x.type === "stock"),
    bonds:  rankedAssets.filter(x => x.type === "bond")
  };

}

/* ============================================================

   Находит лучшие активы каждой категории.
   Формирует объяснение на основании данных актива.
   ============================================================ */
function buildDailyRecommendation(recommendations) {

  const bestFx =
    recommendations.fx.length > 0
      ? recommendations.fx[0]
      : null;

  const bestStock =
    recommendations.stocks.length > 0
      ? recommendations.stocks[0]
      : null;

  const bestBond =
    recommendations.bonds.length > 0
      ? recommendations.bonds[0]
      : null;

  return {

    fx: bestFx,

    stock: bestStock,

    bond: bestBond,

    fxReason:
      bestFx
        ? `score ${bestFx.score}, неделя ${bestFx.week}%`
        : "",

    stockReason:
      bestStock
        ? `score ${bestStock.score}, неделя ${bestStock.week}%`
        : "",

    bondReason:
      bestBond
        ? `score ${bestBond.score}, неделя ${bestBond.week}%`
        : ""

  };

}

/* ============================================================
   БЛОК: ИНВЕСТИЦИОННАЯ ИДЕЯ — buildInvestmentIdea()
   Формирует простую инвестиционную идею на основе
   лучшей акции дня.
   Пока бюджет фиксированный: 5000 ₽.
   ============================================================ */
function buildInvestmentIdea(daily) {

  const budget = 5000;

  if (!daily.stock) {
    return null;
  }

  const lots = Math.max(
    1,
    Math.floor(budget / daily.stock.price)
  );

  const totalCost =
    lots * daily.stock.price;

  const cashLeft =
    budget - totalCost;

  return {

    ticker: daily.stock.ticker,

    name: daily.stock.name,

    lots,

    totalCost,

    cashLeft,

    reason: daily.stockReason

  };

}
/* ============================================================
   КОНЕЦ БЛОКА: ИНВЕСТИЦИОННАЯ ИДЕЯ
   ============================================================ */

   ============================================================ */

  if (!daily.stock) {
    return "Недостаточно данных";

  if (daily.stock.score >= 8) {

  if (daily.stock.score >= 5) {

  }

  return "Слабый рынок. Лучше сохранять ликвидность.";
}

Пример:

  "bonds":[

      "reason":"..."
    },
    {

      "reason":"..."
    },
    {
      "ticker":"SU26246RMFS7",
      "reason":"..."
    }
  ]
}
`;

  const response =
    await fetch(
      GEMINI_URL,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          contents:[
            {
              parts:[
                {
                  text:prompt
                }
              ]
            }
          ]
        })
      }
    );

  const data =
    await response.json();

  const text =
    data.candidates[0]
      .content.parts[0]
      .text;

  return JSON.parse(
    text.replace(/```json/g,"")
        .replace(/```/g,"")
        .trim()
  );
}

  data.stocks.forEach(x => {

    html += `
      <div>
        ${x.ticker}
      </div>

      <div class="small">
        ${x.reason}
      </div>
    `;

  });

  html += "</div>";

  html += `
  <div class="card">
    <b>Топ 3 облигации</b>
  `;

  data.bonds.forEach(x => {

    html += `
      <div>
        ${x.ticker}
      </div>

      <div class="small">
        ${x.reason}
      </div>
    `;

  });

  html += "</div>";

  document.getElementById("output")
    .innerHTML = html;

}

/* ============================================================
   БЛОК: ЗАГРУЗКА ВСЕХ ДАННЫХ — loadData()
   Параллельно (через await) загружает FX, акции и облигации,
   объединяет в глобальный массив assets[].
   ============================================================ */
async function loadData() {

  const fx     = await loadFxData();
  const stocks = await loadStockData();
  const bonds  = await loadBondData();

  assets = [
    ...fx,
    ...stocks,
    ...bonds
  ];

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ВСЕХ ДАННЫХ
   ============================================================ */

/* =======
блок: История рекомендаций
====== */


function saveHistory(recommendations) {

  const daily =
    buildDailyRecommendation(recommendations);

  const record = {

date: new Date().toISOString(),
    fx:
      daily.fx
        ? daily.fx.ticker
        : null,

    stock:
      daily.stock
        ? daily.stock.ticker
        : null,

    bond:
      daily.bond
        ? daily.bond.ticker
        : null,
stockPrice:
  daily.stock
    ? daily.stock.price
    : null
    
  };

  const history =
    JSON.parse(
      localStorage.getItem("history") || "[]"
    );

  history.unshift(record);

  localStorage.setItem(
    "history",
    JSON.stringify(history.slice(0,30))
  );

}

/* =======
конец блока: История рекомендаций
====== */



/* ============================================================
   БЛОК: ТОЧКА ВХОДА КНОПКИ — generate()
   Вызывается по клику на кнопку "Сформировать аналитику дня".
   Использует уже загруженный assets[], считает скоры и рендерит.
   ============================================================ */
async function generate() {

  try {

    document.getElementById("output")
      .innerHTML =
      "<div class='card'>Анализирую рынок...</div>";

    const result =
      await askGemini();

    renderAIRecommendation(
      result
    );

  }
  catch(error) {

    console.error(error);

    document.getElementById("output")
      .innerHTML =
      "<div class='card'>Ошибка Gemini API</div>";

  }

}
/* ============================================================
   КОНЕЦ БЛОКА: ТОЧКА ВХОДА КНОПКИ
   ============================================================ */

/* ============================================================
   БЛОК: ИНИЦИАЛИЗАЦИЯ — init()
   Запускается автоматически при загрузке страницы.
   Сначала загружает данные, затем сразу строит аналитику.
   ============================================================ */
async function init() {

  await loadData();
  generate();

}

init();
