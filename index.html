<!DOCTYPE html>
<html lang="ru">

<!-- ============================================================
  БЛОК: HEAD — мета, заголовок страницы, глобальные стили
  ============================================================ -->
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invest Vibe Engine</title>

<!-- ============================================================
  БЛОК: СТИЛИ — все визуальные стили приложения
  Цветовая схема: тёмный фон #0f1115, карточки #1a1f2b, шапка #161a22
  Основной акцент: синяя кнопка #2d6cdf
  ============================================================ -->
<style>
/* --- Базовые стили страницы --- */
body { font-family: Arial; margin:0; background:#0f1115; color:#fff; }

/* --- Шапка (логотип / название / версия) --- */
header { padding:16px; font-size:18px; background:#161a22; }

/* --- Основной контейнер контента --- */
.container { padding:16px; }

/* --- Кнопка запуска аналитики --- */
button {
  padding:12px; width:100%; margin-top:10px;
  background:#2d6cdf; border:0; color:white; border-radius:8px;
}

/* --- Карточка одной категории активов (валюта / акции / облигации) --- */
.card {
  background:#1a1f2b; padding:12px; margin:8px 0;
  border-radius:10px;
}

/* --- Вспомогательный класс: мелкий приглушённый текст --- */
.small { opacity:0.7; font-size:12px; }
</style>
</head>
<!-- ============================================================
  КОНЕЦ БЛОКА: HEAD
  ============================================================ -->

<body>

<!-- ============================================================
  БЛОК: ШАПКА — название приложения и версия/дата сборки
  ============================================================ -->
<header>Vibe Invest ver. 2026.06.21 00-59 </header>
<!-- ============================================================
  КОНЕЦ БЛОКА: ШАПКА
  ============================================================ -->

<!-- ============================================================
  БЛОК: ОСНОВНОЙ КОНТЕНТ — кнопка и контейнер вывода результатов
  #output заполняется функцией render() после расчёта
  ============================================================ -->
<div class="container">
<button onclick="generate()">Сформировать аналитику дня</button>
<div id="output"></div>
</div>
<!-- ============================================================
  КОНЕЦ БЛОКА: ОСНОВНОЙ КОНТЕНТ
  ============================================================ -->

<!-- ============================================================
  БЛОК: ФУТЕР — авторство
  ============================================================ -->
<footer style="
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#777;
">
замутил Денис Монаев в 2026м
</footer>
<!-- ============================================================
  КОНЕЦ БЛОКА: ФУТЕР
  ============================================================ -->

<!-- ============================================================
  БЛОК: СКРИПТ — вся бизнес-логика приложения
  ============================================================ -->
<script>

/* ============================================================
   БЛОК: КОНФИГУРАЦИЯ — списки тикеров
   Добавляй/убирай тикеры здесь, логика подхватит автоматически.
   STOCK_TICKERS  — акции MOEX
   BOND_TICKERS   — облигации (ОФЗ)
   ============================================================ */
const STOCK_TICKERS = [
  "SBER",
  "GAZP",
  "LKOH"
];

const BOND_TICKERS = [
  "SU26238RMFS4",
  "SU26240RMFS0"
];
/* ============================================================
   КОНЕЦ БЛОКА: КОНФИГУРАЦИЯ
   ============================================================ */

/* ============================================================
   БЛОК: ГЛОБАЛЬНОЕ ХРАНИЛИЩЕ АКТИВОВ
   assets[] — единый массив всех загруженных активов.
   Заполняется в loadData(), используется в generate().
   ============================================================ */
let assets = [];
/* ============================================================
   КОНЕЦ БЛОКА: ГЛОБАЛЬНОЕ ХРАНИЛИЩЕ АКТИВОВ
   ============================================================ */

/* ============================================================
   БЛОК: ФУНКЦИЯ СКОРИНГА — score(a)
   Вычисляет числовой рейтинг одного актива.
   Формула:
     + change * 2   — вес дневного изменения цены (%)
     + week         — недельное изменение (%)
     + 0.5          — бонус за тип "fx" (валюта)
     + 1            — бонус за тип "stock" (акция)
   Возвращает float с двумя знаками после запятой.
   ============================================================ */
function score(a){
  let s = 0;
  s += a.change * 2;
  s += a.week;

  if(a.type === "fx") s += 0.5;
  if(a.type === "stock") s += 1;

  return parseFloat(s.toFixed(2));
}
/* ============================================================
   КОНЕЦ БЛОКА: ФУНКЦИЯ СКОРИНГА
   ============================================================ */

/* ============================================================
   БЛОК: ЗАГРУЗКА ВАЛЮТ — loadFxData()
   Источник: ЦБ РФ (cbr-xml-daily.ru/daily_json.js)
   Поведение при ошибке: используются fallback-значения (USD=92, EUR=100).
   Поля объекта актива: type, ticker, name, price, change, week
   change и week — захардкожены (ЦБ не возвращает динамику).
   ============================================================ */
async function loadFxData() {

  /* --- Fallback-данные на случай недоступности API --- */
  const fxAssets = [
    {
      type:"fx",
      ticker:"USD",
      name:"USD/RUB",
      price:92,
      change:1.2,
      week:2.5
    },
    {
      type:"fx",
      ticker:"EUR",
      name:"EUR/RUB",
      price:100,
      change:0.4,
      week:1.1
    }
  ];

  try {

    /* --- Запрос к API ЦБ РФ --- */
    const response = await fetch("https://www.cbr-xml-daily.ru/daily_json.js");

    if (!response.ok) {
      throw new Error("API unavailable");
    }

    const data = await response.json();

    /* --- Извлечение курсов из ответа --- */
    const usd = data?.Valute?.USD?.Value;
    const eur = data?.Valute?.EUR?.Value;

    /* --- Перезапись fallback-цен реальными данными --- */
    if (usd) {
      fxAssets[0].price = usd;
    }

    if (eur) {
      fxAssets[1].price = eur;
    }

    console.log("Курсы ЦБ загружены:", {
      USD: usd,
      EUR: eur
    });

  } catch (err) {

    /* --- Логируем ошибку, возвращаем fallback --- */
    console.warn(
      "Не удалось загрузить курсы ЦБ. Используются значения по умолчанию.",
      err
    );

  }

  return fxAssets;
}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ВАЛЮТ
   ============================================================ */

/* ============================================================
   БЛОК: ЗАГРУЗКА ОДНОЙ АКЦИИ MOEX — loadMoexQuote(ticker)
   Источник: MOEX ISS API (iss.moex.com)
   Приоритет полей цены: LAST → MARKETPRICE → LCURRENTPRICE → fallback(280)
   Возвращает число (цену последней сделки).
   ============================================================ */
async function loadMoexQuote(ticker) {

  /* --- Fallback-цена при ошибке API --- */
  const fallbackPrice = 280;

  try {

    /* --- Формирование URL запроса к MOEX ISS --- */
    const url =
      `https://iss.moex.com/iss/engines/stock/markets/shares/securities/${ticker}.json`;

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("MOEX API unavailable");
    }

    const data = await response.json();

    /* --- MOEX возвращает колонки и строки раздельно, сопоставляем их --- */
    const columns = data.marketdata.columns;
    const row = data.marketdata.data[0];

    if (!row) {
      throw new Error("No market data");
    }

    /* --- Вспомогательная функция: получить значение поля по имени колонки --- */
    const getField = (name) => {
      const idx = columns.indexOf(name);
      return idx >= 0 ? row[idx] : null;
    };

    /* --- Выбираем первое непустое ценовое поле из приоритетного списка --- */
    const price =
      getField("LAST") ||
      getField("MARKETPRICE") ||
      getField("LCURRENTPRICE") ||
      fallbackPrice;

    console.log(`MOEX ${ticker}:`, price);

    return Number(price);

  } catch (err) {

    /* --- Логируем ошибку, возвращаем fallback --- */
    console.warn(
      `Не удалось получить цену ${ticker} из MOEX`,
      err
    );

    return fallbackPrice;

  }

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ОДНОЙ АКЦИИ MOEX
   ============================================================ */

/* ============================================================
   БЛОК: ЗАГРУЗКА ВСЕХ АКЦИЙ — loadStockData()
   Реальный запрос к MOEX делается только для SBER.
   GAZP и LKOH используют захардкоженные данные (расширь по аналогии).
   change и week — захардкожены для всех акций.
   Возвращает массив объектов по тикерам из STOCK_TICKERS.
   ============================================================ */
async function loadStockData() {

  /* --- Запрос реальной цены SBER через loadMoexQuote --- */
  const sberPrice = await loadMoexQuote("SBER");

  /* --- Справочник акций: имя, цена (реальная или fallback), изменения --- */
  const stockInfo = {

    SBER: {
      name:"Сбербанк",
      price:sberPrice,   // реальная цена с MOEX
      change:2.1,
      week:4.2
    },

    GAZP: {
      name:"Газпром",
      price:165,         // захардкожена
      change:-0.3,
      week:1.0
    },

    LKOH: {
      name:"Лукойл",
      price:7200,        // захардкожена
      change:1.8,
      week:3.0
    }

  };

  /* --- Собираем массив активов по списку тикеров из конфигурации --- */
  return STOCK_TICKERS.map(ticker => ({
    type:"stock",
    ticker,
    ...stockInfo[ticker]
  }));

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ВСЕХ АКЦИЙ
   ============================================================ */

/* ============================================================
   БЛОК: ЗАГРУЗКА ОБЛИГАЦИЙ — loadBondData()
   Все данные захардкожены (внешних запросов нет).
   Для добавления новой ОФЗ — добавь тикер в BOND_TICKERS
   и запись в bondInfo с полями name, price, change, week.
   ============================================================ */
async function loadBondData() {

  /* --- Справочник облигаций: имя, цена, изменения --- */
  const bondInfo = {
    SU26238RMFS4: {
      name:"ОФЗ 26238",
      price:95,
      change:0.1,
      week:0.3
    },
    SU26240RMFS0: {
      name:"ОФЗ 26240",
      price:97,
      change:0.2,
      week:0.5
    }
  };

  /* --- Собираем массив активов по списку тикеров из конфигурации --- */
  return BOND_TICKERS.map(ticker => ({
    type:"bond",
    ticker,
    ...bondInfo[ticker]
  }));

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ОБЛИГАЦИЙ
   ============================================================ */

/* ============================================================
   БЛОК: РАСЧЁТ РЕЙТИНГА — calculateScores(data)
   Принимает массив активов, добавляет поле score каждому,
   возвращает отсортированный по убыванию score массив.
   ============================================================ */
function calculateScores(data) {

  return data
    .map(asset => ({
      ...asset,
      score: score(asset)
    }))
    .sort((a, b) => b.score - a.score);

}
/* ============================================================
   КОНЕЦ БЛОКА: РАСЧЁТ РЕЙТИНГА
   ============================================================ */

/* ============================================================
   БЛОК: ФОРМИРОВАНИЕ РЕКОМЕНДАЦИЙ — generateRecommendations(rankedAssets)
   Разбивает единый отсортированный массив на три категории.
   Возвращает объект { fx, stocks, bonds }.
   ============================================================ */
function generateRecommendations(rankedAssets) {

  return {
    fx:     rankedAssets.filter(x => x.type === "fx"),
    stocks: rankedAssets.filter(x => x.type === "stock"),
    bonds:  rankedAssets.filter(x => x.type === "bond")
  };

}
/* ============================================================
   КОНЕЦ БЛОКА: ФОРМИРОВАНИЕ РЕКОМЕНДАЦИЙ
   ============================================================ */
   
   
    
/* ============================================================
   БЛОК: РЕКОМЕНДАЦИЯ ДНЯ — buildDailyRecommendation()
   Находит лучшие активы каждой категории.
   Формирует объяснение на основании данных актива.
   ============================================================ */
function buildDailyRecommendation(recommendations) {

  const bestFx =
    recommendations.fx.length > 0
      ? recommendations.fx[0]
      : null;

  const bestStock =
    recommendations.stocks.length > 0
      ? recommendations.stocks[0]
      : null;

  const bestBond =
    recommendations.bonds.length > 0
      ? recommendations.bonds[0]
      : null;

  return {

    fx: bestFx,

    stock: bestStock,

    bond: bestBond,

    fxReason:
      bestFx
        ? `score ${bestFx.score}, неделя ${bestFx.week}%`
        : "",

    stockReason:
      bestStock
        ? `score ${bestStock.score}, неделя ${bestStock.week}%`
        : "",

    bondReason:
      bestBond
        ? `score ${bestBond.score}, неделя ${bestBond.week}%`
        : ""

  };

}
/* ============================================================
   КОНЕЦ БЛОКА: РЕКОМЕНДАЦИЯ ДНЯ
   ============================================================ */


/* ============================================================
   БЛОК: РЕНДЕР — render(recommendations)
   Строит HTML из карточек и вставляет в #output.
   Карточки:
   - Рекомендация дня
   - Валюта
   - Акции
   - Облигации
   ============================================================ */
function render(recommendations) {

  let html = "";

  /* --- Получаем лучшие активы дня --- */
  const daily = buildDailyRecommendation(recommendations);

  /* --- Карточка: Рекомендация дня --- */
  html += "<div class='card'>";
  html += "<b>Рекомендация дня</b>";

  if (daily.fx) {
  html += `<div>Валюта: ${daily.fx.ticker}</div>`;
  html += `<div class='small'>${daily.fxReason}</div>`;
}

  if (daily.stock) {
  html += `<div>Акция: ${daily.stock.ticker}</div>`;
  html += `<div class='small'>${daily.stockReason}</div>`;
}

  if (daily.bond) {
  html += `<div>Облигация: ${daily.bond.name}</div>`;
  html += `<div class='small'>${daily.bondReason}</div>`;
}

  html += "</div>";

  /* --- Карточка: Валюта --- */
  html += "<div class='card'><b>Валюта</b>";

  recommendations.fx.forEach(x => {
    html += `<div>${x.ticker} (${x.name}) | ${x.price.toFixed(2)} ₽ | score ${x.score}</div>`;
  });

  html += "</div>";

  /* --- Карточка: Акции MOEX (топ-3) --- */
  html += "<div class='card'><b>Акции MOEX (топ)</b>";

  recommendations.stocks.slice(0,3).forEach(x => {
    html += `<div>${x.ticker} (${x.name}) | ${x.price} ₽ | score ${x.score}</div>`;
  });

  html += "</div>";

  /* --- Карточка: Облигации (топ-3) --- */
  html += "<div class='card'><b>Облигации (топ)</b>";

  recommendations.bonds.slice(0,3).forEach(x => {
    html += `<div>${x.ticker} (${x.name}) | score ${x.score}</div>`;
  });

  html += "</div>";

  /* --- Вставка готового HTML в DOM --- */
  document.getElementById("output").innerHTML = html;

}
/* ============================================================
   КОНЕЦ БЛОКА: РЕНДЕР
   ============================================================ */




/* ============================================================
   БЛОК: ЗАГРУЗКА ВСЕХ ДАННЫХ — loadData()
   Параллельно (через await) загружает FX, акции и облигации,
   объединяет в глобальный массив assets[].
   ============================================================ */
async function loadData() {

  const fx     = await loadFxData();
  const stocks = await loadStockData();
  const bonds  = await loadBondData();

  assets = [
    ...fx,
    ...stocks,
    ...bonds
  ];

}
/* ============================================================
   КОНЕЦ БЛОКА: ЗАГРУЗКА ВСЕХ ДАННЫХ
   ============================================================ */

/* ============================================================
   БЛОК: ТОЧКА ВХОДА КНОПКИ — generate()
   Вызывается по клику на кнопку "Сформировать аналитику дня".
   Использует уже загруженный assets[], считает скоры и рендерит.
   ============================================================ */
function generate() {

  const rankedAssets    = calculateScores(assets);
  const recommendations = generateRecommendations(rankedAssets);

  render(recommendations);

}
/* ============================================================
   КОНЕЦ БЛОКА: ТОЧКА ВХОДА КНОПКИ
   ============================================================ */

/* ============================================================
   БЛОК: ИНИЦИАЛИЗАЦИЯ — init()
   Запускается автоматически при загрузке страницы.
   Сначала загружает данные, затем сразу строит аналитику.
   ============================================================ */
async function init() {

  await loadData();
  generate();

}

init();
/* ============================================================
   КОНЕЦ БЛОКА: ИНИЦИАЛИЗАЦИЯ
   ============================================================ */

</script>
<!-- ============================================================
   КОНЕЦ БЛОКА: СКРИПТ
   ============================================================ -->

</body>
</html>
